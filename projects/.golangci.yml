run:
  concurrency: 4
  timeout: 1m
  tests: false
  go: '1.25'

output:
  format: colored-line-number

issues:
  max-issues-per-linter: 1000
  max-same-issues: 1000
  exclude-use-default: false

linters-settings:
  prealloc:
    for-loops: true
  stylecheck:
    go: "1.25"
    checks: ["all"]
  staticcheck:
    go: "1.25"
    checks: ["all"]
  nolintlint:
    allow-unused: true
    require-explanation: true
    require-specific: true
  gosimple:
    go: "1.25"
    checks: ["all"]
  gocyclo:
    min-complexity: 20
  gocritic:
    disabled-checks:
      - hugeParam
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental
      - opinionated
  dupl:
    threshold: 70
  dogsled:
    max-blank-identifiers: 2
  errcheck:
    check-type-assertions: true
    check-blank: true
  govet:
    check-shadowing: true
    enable-all: true
    shadow:
      strict: true
  funlen:
    lines: 80
    statements: 80
    ignore-comments: true
  wrapcheck:
    ignoreSigs:
      - .Errorf(
      - errors.New(
      - errors.Unwrap(
      - .Wrap(
      - .Wrapf(
  exhaustive:
    default-signifies-exhaustive: true
  godox:
    keywords:
      - TODO
      - FIXME
      - HACK
  gci:
    sections:
      - standard
      - default
      - prefix(github.com/your/project)
  gomnd:
    ignored-functions:
      - os.Exit
      - strconv.FormatInt
      - strconv.ParseInt
  contextcheck:
    disable: false
  nilnil:
    disable: false

linters:
  disable-all: true
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - forbidigo
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - gomodguard
    - revive
    - gosec
    - gosimple
    - govet
    - godot
    - godox
    - ineffassign
    - misspell
    - nakedret
    - nolintlint
    - exportloopref
    - prealloc
    - staticcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - wrapcheck
    - exhaustive
    - contextcheck
    - nilnil
    - gomnd
    - gci
    - noctx
    - sqlclosecheck
    - rowserrcheck
    - tparallel
    - wastedassign
    - asasalint
    - reassign
  presets:
    - comment
    - error